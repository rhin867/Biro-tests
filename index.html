// ── HELPERS ──
const fmt = (s)=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const parseAnswerStr = (str)=>{
  const res={};
  if(!str.trim()) return res;
  if(str.includes("-")||str.includes(",")||str.includes(".")){
    str.split(/[,\n]/).forEach(p=>{
      const parts=p.trim().split(/[-.\s]+/);
      if(parts.length>=2){const n=parseInt(parts[0]);const a=parts[parts.length-1].toUpperCase();if(!isNaN(n)&&a)res[n-1]=a;}
    });
  } else {
    str.replace(/\s/g,"").split("").forEach((c,i)=>{res[i]=c.toUpperCase();});
  }
  return res;
};
const renderMd = (t)=>{
  if(!t) return "";
  return t
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/`(.*?)`/g,"<code style='background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:12px'>$1</code>")
    .replace(/\n/g,"<br/>");
};

// ── ANALYSIS GENERATOR ──
const generateAnalysis = (userAns, keyAns, scheme, testName) => {
  let correct=0,incorrect=0,skipped=0;
  const ss={
    Mathematics:{correct:0,incorrect:0,skipped:0,qs:25},
    Physics:{correct:0,incorrect:0,skipped:0,qs:25},
    Chemistry:{correct:0,incorrect:0,skipped:0,qs:25},
  };
  const missed={Mathematics:[],Physics:[],Chemistry:[]};
  const qResults=[];
  for(let i=0;i<75;i++){
    const s=i<25?"Mathematics":i<50?"Physics":"Chemistry";
    const ch=CHAPTERS[s][i%CHAPTERS[s].length];
    const ua=userAns[i]||null;
    const ca=keyAns[i]||["A","B","C","D"][Math.floor(Math.random()*4)];
    let result=ua?(ua===ca?"correct":"incorrect"):"skipped";
    if(result==="correct"){correct++;ss[s].correct++;}
    else if(result==="incorrect"){incorrect++;ss[s].incorrect++;if(!missed[s].includes(ch))missed[s].push(ch);}
    else{skipped++;ss[s].skipped++;}
    qResults.push({q:i+1,s,ch,result,ua,ca});
  }
  const score=correct*scheme.correct - incorrect*scheme.wrong;
  const max=75*scheme.correct;
  const acc=correct+incorrect>0?Math.round(correct/(correct+incorrect)*100):0;
  const personas=["The Gambler 🎲","The Safe Player 🛡️","The Speedster ⚡","The Overthinker 🤔","The Wild Card 🃏","The Sniper 🎯"];
  return {
    id:Date.now(),testName,score,max,acc,correct,incorrect,skipped,scheme,ss,missed,qResults,
    aq:{perfect:correct,wasted:Math.round(incorrect*.6),overtime:Math.round(correct*.2),confused:Math.round(incorrect*.15)},
    sp:{actual:score,p50:score+Math.round(incorrect*.5*scheme.correct),p75:score+Math.round(incorrect*.75*scheme.correct),p100:score+incorrect*scheme.correct},
    persona:personas[Math.floor(Math.random()*personas.length)],
    negLost:incorrect*scheme.wrong,
    ts:new Date().toLocaleDateString("en-IN"),
  };
};

// ── BIRO-BRAIN API ──
const callAI = async (messages, ctx=null) => {
  const sys=`You are "Biro-Brain," an elite AI Mentor for JEE/NEET aspirants. Be energetic, data-driven, direct — like a top IIT alumnus.
${ctx?`Test context: Score ${ctx.score}/${ctx.max}, Accuracy ${ctx.acc}%, Missed: ${JSON.stringify(ctx.missed)}`:""}
Rules:
- Concise bullet points, bold key terms
- Gamify: "quests", "boss raids", "leveling up"
- LaTeX for math: inline $formula$, block $$formula$$
- No generic quotes — tie to their actual data
- Hint first for doubts, full solution if pressed
- Be brutally honest about wasted marks`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages}),
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("")||"No response.";
};

// ── MAIN APP ──
function App() {
  const [page,setPage]=useState("dashboard");
  const [drawer,setDrawer]=useState(false);
  const [tests,setTests]=useState(()=>store.get("biro-tests")||[]);
  const [analysis,setAnalysis]=useState(()=>store.get("biro-cur")||null);
  const [analysisTab,setATab]=useState("overview");
  const [mistakes,setMistakes]=useState(()=>store.get("biro-mb")||[]);
  const [goal,setGoal]=useState(()=>store.get("biro-goal")||{college:"IIT Bombay – CS",hours:8,months:6});
  const [posts,setPosts]=useState(()=>store.get("biro-posts")||[
    {id:1,name:"Rahul",text:"Wave Optics Q34 ka concept kisi ne samjha? Mujhe interference pattern ka derivation nahi aata 😭",time:"2h ago",likes:8},
    {id:2,name:"Priya",text:"QFT-01 attempt kiya? Maths section tough tha iske baar!",time:"5h ago",likes:14},
  ]);
  const [postInput,setPostInput]=useState("");
  const [chatMsgs,setChatMsgs]=useState([{role:"assistant",content:"⚡ **Biro-Brain online.** Main tera JEE/NEET AI mentor hoon.\n\n**Kya kar sakta hoon:**\n- 📊 Test results analyze karna\n- 🗓️ Study plan banana\n- 💡 Doubts solve karna (step-by-step)\n- 🎯 Strategy suggest karna\n\nApna test results share karo ya koi doubt pucho!"}]);
  const [chatInput,setChatInput]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const [plan,setPlan]=useState(()=>store.get("biro-plan")||null);
  const [planLoading,setPlanLoading]=useState(false);
  const [apiKey,setApiKey]=useState(()=>store.get("biro-key")||"");
  const [showKeyModal,setShowKeyModal]=useState(false);
  const [monitor,setMonitor]=useState(false);
  const [monTime,setMonTime]=useState(0);
  const [extName,setExtName]=useState("My Test");
  const [extKey,setExtKey]=useState("");
  const [extAns,setExtAns]=useState("");
  const [scheme,setScheme]=useState({correct:4,wrong:1});
  const [toast,setToast]=useState(null);
  const chatEnd=useRef(null);
  const monRef=useRef(null);
  const streamRef=useRef(null);

  useEffect(()=>{store.set("biro-tests",tests)},[tests]);
  useEffect(()=>{store.set("biro-mb",mistakes)},[mistakes]);
  useEffect(()=>{store.set("biro-goal",goal)},[goal]);
  useEffect(()=>{store.set("biro-posts",posts)},[posts]);
  useEffect(()=>{store.set("biro-plan",plan)},[plan]);
  useEffect(()=>{if(apiKey)store.set("biro-key",apiKey)},[apiKey]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"})},[chatMsgs]);

  useEffect(()=>{
    if(monitor){monRef.current=setInterval(()=>setMonTime(t=>t+1),1000);}
    else{clearInterval(monRef.current);setMonTime(0);}
    return ()=>clearInterval(monRef.current);
  },[monitor]);

  const showToast=(msg,type="success")=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };

  const handleGenerateAnalysis=()=>{
    if(!extKey.trim()){showToast("Answer key daalo pehle!","error");return;}
    const ua=parseAnswerStr(extAns);
    const ka=parseAnswerStr(extKey);
    const a=generateAnalysis(ua,ka,scheme,extName||"Test");
    // push wrong qs to mistake book
    const newMb=[...mistakes,...a.qResults.filter(q=>q.result==="incorrect").map(q=>({...q,date:a.ts,tn:a.testName,id:`${a.id}-${q.q}`}))].slice(-300);
    setMistakes(newMb);
    setTests(prev=>[a,...prev]);
    store.set("biro-cur",a);
    setAnalysis(a);
    setPage("analysis");
    setATab("overview");
    showToast("Analysis ready! 🎉");
  };

  const handleStartMonitor=async()=>{
    try{
      const s=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false});
      streamRef.current=s;
      setMonitor(true);
      showToast("Screen monitoring started! 🔴");
    }catch{
      setMonitor(true);
      showToast("Demo mode – monitor started!");
    }
  };

  const handleStopMonitor=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    setMonitor(false);
    showToast(`Session ended – ${fmt(monTime)} recorded`);
  };

  const sendChat=async()=>{
    if(!chatInput.trim()||chatLoading) return;
    const userMsg={role:"user",content:chatInput};
    const newMsgs=[...chatMsgs,userMsg];
    setChatMsgs(newMsgs);
    setChatInput("");
    setChatLoading(true);
    try{
      const apiMsgs=newMsgs.map(m=>({role:m.role,content:m.content}));
      const res=await callAI(apiMsgs,analysis);
      setChatMsgs([...newMsgs,{role:"assistant",content:res}]);
    }catch(e){
      setChatMsgs([...newMsgs,{role:"assistant",content:`❌ Error: ${e.message}\n\nIf API key issue hai toh Settings mein check karo.`}]);
    }
    setChatLoading(false);
  };

  const genPlan=async()=>{
    setPlanLoading(true);
    const ctx=analysis?`Missed: ${JSON.stringify(analysis.missed)}, Score: ${analysis.score}/${analysis.max}, Acc: ${analysis.acc}%`:`Target: ${goal.college}`;
    try{
      const res=await callAI([{role:"user",content:`Generate a detailed 7-day JEE study plan. Context: ${ctx}. Target college: ${goal.college}. Daily study hours: ${goal.hours}. Use RPG format: Day titles, Daily Quests (topics to study), Boss Raid (hardest missed concept), XP Reward. Make it specific and actionable.`}],analysis);
      setPlan(res);

    setPlanLoading(false);
  };

  const targetCollege=COLLEGES.find(c=>c.name===goal.college)||COLLEGES[0];
  const avgScore=tests.length?Math.round(tests.reduce((a,t)=>a+(t.score||0),0)/tests.length):0;
  const marksGap=Math.max(0,targetCollege.cutoff-avgScore);

  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:"dashboard"},
    {id:"tests",label:"My Tests",icon:"tests"},
    {id:"external",label:"External Analysis",icon:"external"},
    {id:"planner",label:"Study Planner",icon:"planner"},
    {id:"birobrain",label:"Biro-Brain AI",icon:"brain"},
    {id:"mistakes",label:"Mistake Book",icon:"book"},
    {id:"goal",label:"Goal Tracker",icon:"goal"},
    {id:"community",label:"Community",icon:"community"},
    {id:"history",label:"History",icon:"history"},
    {id:"settings",label:"Settings",icon:"settings"},
  ];

  const goAnalysis=(t)=>{store.set("biro-cur",t);setAnalysis(t);setPage("analysis");setATab("overview");};

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#f1f5f9",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>

      {/* TOAST */}
      {toast&&(
        <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:999,background:toast.type==="error"?"#ef4444":"#22c55e",color:"#fff",borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:700,boxShadow:"0 4px 20px rgba(0,0,0,.15)",animation:"fadeIn .3s ease",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}

      {/* HEADER */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100}}>
        <button onClick={()=>setDrawer(true)} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#374151",display:"flex"}}><Icon name="menu" size={22}/></button>
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#2563eb,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Icon name="brain" size={18} color="#fff"/>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:"#111827",fontFamily:"'Space Grotesk',sans-serif",lineHeight:1}}>Biro Test</div>
            <div style={{fontSize:10,color:"#6b7280",fontWeight:500}}>CBT Analyzer</div>
          </div>
        </div>
        {monitor&&(
          <div style={{background:"#fee2e2",color:"#dc2626",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
            <div className="recording-dot"/>
            {fmt(monTime)}
          </div>
        )}
        <button onClick={()=>setPage("settings")} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#6b7280",display:"flex"}}><Icon name="settings" size={20}/></button>
      </div>

      {/* DRAWER */}
      {drawer&&(
        <div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setDrawer(false)}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)"}}/>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:270,background:"#fff",animation:"slideIn .2s ease",padding:"16px 10px",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,padding:"0 6px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#2563eb,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Icon name="brain" size={20} color="#fff"/>
                </div>
                <div>
                  <div style={{fontSize:16,fontWeight:800,fontFamily:"'Space Grotesk',sans-serif",color:"#111827"}}>Biro Test</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>CBT Analyzer</div>
                </div>
              </div>
              <button onClick={()=>setDrawer(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#6b7280",display:"flex"}}><Icon name="close" size={20}/></button>
            </div>
            {navItems.map(item=>(
              <div key={item.id} className={`nav-item ${page===item.id?"active":""}`} onClick={()=>{setPage(item.id);setDrawer(false);}}>
                <Icon name={item.icon} size={18}/>{item.label}
              </div>
            ))}
            <div style={{marginTop:16,padding:"10px 14px",background:"#f8fafc",borderRadius:10,fontSize:12,color:"#6b7280"}}>
              <strong style={{color:"#374151"}}>v1.0</strong> · NTA Classic Mode · Made with ❤️ for JEE aspirants
            </div>
          </div>
        </div>
      )}

      {/* CONTENT */}
      <div style={{padding:"16px 16px 90px"}}>

        {/* ═══ DASHBOARD ═══ */}
        {page==="dashboard"&&(
          <div className="fade-in">
            <div style={{marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:800,color:"#111827",fontFamily:"'Space Grotesk',sans-serif"}}>Dashboard</div>
              <div style={{fontSize:13,color:"#6b7280"}}>Welcome back, aspirant ⚡</div>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <StatCard label="Avg Accuracy" value={`${tests.length?Math.round(tests.reduce((a,t)=>a+(t.acc||0),0)/tests.length):0}%`} color={tests.length&&tests[0]?.acc>50?"#22c55e":"#ef4444"}/>
              <StatCard label="Avg Score" value={avgScore>0?`+${avgScore}`:avgScore} color={avgScore>0?"#22c55e":"#ef4444"} sub={`/${tests[0]?.max||300}`}/>

            </div>

            {/* Target banner */}
            <div className="card" style={{padding:16,marginBottom:14,background:"linear-gradient(135deg,#eff6ff,#f0fdf4)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:10,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Your Target</div>
                  <div style={{fontSize:16,fontWeight:800,color:"#111827",marginTop:2}}>{goal.college}</div>
                  <div style={{fontSize:12,color:"#6b7280"}}>Cutoff: {targetCollege.cutoff} marks</div>

                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:34,fontWeight:900,color:marksGap>0?"#ef4444":"#22c55e",lineHeight:1}}>{marksGap}</div>

                {label:"Biro-Brain AI",icon:"brain",p:"birobrain",color:"#059669",bg:"#d1fae5"},
                {label:"Mistake Book",icon:"book",p:"mistakes",color:"#d97706",bg:"#fef3c7"},

                  <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>{a.label}</div>

                  <LineChart data={[...tests].reverse().slice(0,10).map((t,i)=>({name:`T${i+1}`,score:t.score,acc:t.acc}))}>
                    <XAxis dataKey="name" tick={{fontSize:10}}/>
                    <YAxis tick={{fontSize:10}}/>
                    <Tooltip contentStyle={{fontSize:11,borderRadius:8,border:"1px solid #e2e8f0"}}/>
                    <Line type="monotone" dataKey="score" stroke="#2563eb" strokeWidth={2} dot={{r:3}} name="Score"/>
                    <Line type="monotone" dataKey="acc" stroke="#22c55e" strokeWidth={2} dot={{r:3}} name="Accuracy %"/>

                <div style={{fontSize:40,marginBottom:12}}>📊</div>

                <div style={{fontSize:13,color:"#6b7280",marginTop:4,marginBottom:16}}>Pehla analysis generate karo performance dekhne ke liye</div>
                <button className="btn-primary" onClick={()=>setPage("external")}>Start Analysis</button>
              </div>
            )}
          </div>

        {/* ═══ EXTERNAL ANALYSIS ═══ */}

          <div className="fade-in">
            <div style={{marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:800,color:"#111827",fontFamily:"'Space Grotesk',sans-serif"}}>External Analysis</div>

            </div>

            {/* Monitor */}

              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <Icon name="monitor" size={20} color={monitor?"#f59e0b":"#6b7280"}/>
                <div>
                  <div style={{fontSize:14,fontWeight:700}}>Screen Monitor</div>
                  <div style={{fontSize:12,color:"#6b7280"}}>Dusre platform pe test dete time monitor karo</div>
                </div>
              </div>
              {monitor?(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                    <div className="recording-dot"/>
                    <span style={{fontSize:14,fontWeight:700,color:"#dc2626"}}>Recording — {fmt(monTime)}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                    {[["Switches",Math.floor(monTime/120)],["Est Qs",Math.floor(monTime/30)],["Reviews",Math.floor(monTime/90)]].map(([l,v])=>(
                      <div key={l} style={{background:"#fff",borderRadius:8,padding:"8px",textAlign:"center",border:"1px solid #fde68a"}}>
                        <div style={{fontSize:18,fontWeight:800,color:"#f59e0b"}}>{v}</div>
                        <div style={{fontSize:10,color:"#6b7280"}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <button className="btn-danger" onClick={handleStopMonitor} style={{width:"100%"}}>Stop Monitor</button>
                </div>
              ):(
                <button onClick={handleStartMonitor} style={{width:"100%",background:"#f59e0b",color:"#fff",border:"none",borderRadius:10,padding:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <Icon name="monitor" size={16} color="#fff"/> Start Monitor Session
                </button>
              )}
            </div>

            {/* Data input */}
            <div className="card" style={{padding:16}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Generate Deep Analysis</div>

              <div style={{marginBottom:12}}>
                <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>Test Name</label>
                <input value={extName} onChange={e=>setExtName(e.target.value)} style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:14}} placeholder="e.g. QFT-01 Paper"/>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>Correct (+)</label>
                  <input type="number" value={scheme.correct} onChange={e=>setScheme(p=>({...p,correct:+e.target.value}))} style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:14}}/>
                </div>
                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>Wrong (−)</label>
                  <input type="number" value={scheme.wrong} onChange={e=>setScheme(p=>({...p,wrong:+e.target.value}))} style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:14}}/>
                </div>
              </div>

              <div style={{marginBottom:12}}>
                <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>
                  Answer Key <span style={{color:"#6b7280",fontWeight:400}}>(1-A, 2-B, 3-C... ya ABCD...)</span>
                </label>
                <textarea value={extKey} onChange={e=>setExtKey(e.target.value)} rows={3} style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:13,resize:"vertical"}} placeholder="1-A, 2-B, 3-C... ya ABCDBADBC..."/>
              </div>

              <div style={{marginBottom:16}}>
                <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>
                  Tumhare Answers <span style={{color:"#6b7280",fontWeight:400}}>(same format, blank = skipped)</span>
                </label>
                <textarea value={extAns} onChange={e=>setExtAns(e.target.value)} rows={3} style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:13,resize:"vertical"}} placeholder="1-B, 2-A, 3-D..."/>
              </div>

              <button onClick={handleGenerateAnalysis} style={{width:"100%",background:"linear-gradient(135deg,#2563eb,#7c3aed)",color:"#fff",border:"none",borderRadius:10,padding:"13px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <Icon name="sparkle" size={17} color="#fff"/> Generate Analysis
              </button>
            </div>
          </div>
        )}

        {/* ═══ ANALYSIS ═══ */}
        {page==="analysis"&&analysis&&(
          <div className="fade-in">
            <div style={{marginBottom:14}}>
              <div style={{fontSize:18,fontWeight:800,color:"#111827",fontFamily:"'Space Grotesk',sans-serif"}}>{analysis.testName}</div>
              <div style={{fontSize:12,color:"#6b7280"}}>Attempt #1 · {analysis.ts}</div>
            </div>

            {/* Score cards */}
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <StatCard label="Score" value={analysis.score} color={analysis.score>0?"#2563eb":"#ef4444"} sub={`/${analysis.max}`}/>
              <StatCard label="Accuracy" value={`${analysis.acc}%`} color={analysis.acc>50?"#22c55e":"#ef4444"}/>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <StatCard label="Correct ✓" value={analysis.correct} color="#22c55e" sub={`+${analysis.correct*analysis.scheme.correct}`}/>
              <StatCard label="Wrong ✗" value={analysis.incorrect} color="#ef4444" sub={`-${analysis.incorrect*analysis.scheme.wrong}`}/>
              <StatCard label="Skipped" value={analysis.skipped} color="#94a3b8"/>
            </div>

            {/* Bar */}
            <div className="card" style={{padding:14,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Overall Performance</div>
              <div style={{height:10,borderRadius:5,background:"#f1f5f9",overflow:"hidden",display:"flex"}}>
                <div style={{width:`${(analysis.correct/75)*100}%`,background:"#22c55e",transition:"width .8s"}}/>
                <div style={{width:`${(analysis.incorrect/75)*100}%`,background:"#ef4444",transition:"width .8s"}}/>
              </div>
              <div style={{display:"flex",gap:14,marginTop:6,fontSize:11}}>
                {[["#22c55e","Correct",analysis.correct],["#ef4444","Incorrect",analysis.incorrect],["#94a3b8","Skipped",analysis.skipped]].map(([c,l,v])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:8,height:8,borderRadius:2,background:c}}/>
                    <span style={{color:"#6b7280"}}>{l} ({v})</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
              {[["overview","Overview"],["attempt","Attempt"],["potential","Potential"],["time","Journey"],["chapters","Chapters"],["missed","Missed"],["painful","Painful Qs"]].map(([t,l])=>(
                <button key={t} className={`tab-btn ${analysisTab===t?"active":""}`} onClick={()=>setATab(t)}>{l}</button>
              ))}
            </div>

            {/* Overview */}
            {analysisTab==="overview"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                  {SUBJECTS.map(s=>(
                    <div key={s} className="card" style={{padding:12,textAlign:"center"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:4}}>{s.substring(0,4)}</div>
                      <div style={{fontSize:22,fontWeight:800,color:analysis.ss[s].correct>0?"#22c55e":"#ef4444"}}>{analysis.ss[s].correct}</div>
                      <div style={{fontSize:10,color:"#6b7280"}}>/{analysis.ss[s].qs}</div>
                      <div style={{fontSize:10,color:"#ef4444",marginTop:2}}>✗ {analysis.ss[s].incorrect}</div>
                    </div>
                  ))}
                </div>
                <div className="card" style={{padding:14}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Subject-wise Breakdown</div>
                  <ResponsiveContainer width="100%" height={160}>
                    <BarChart data={SUBJECTS.map(s=>({name:s.substring(0,4),correct:analysis.ss[s].correct,incorrect:analysis.ss[s].incorrect,skipped:analysis.ss[s].skipped}))}>

            {analysisTab==="attempt"&&(

                <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>Categorization of your attempt patterns</div>

                  <div key={l} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f8fafc"}}>

                      <div style={{fontSize:13,fontWeight:700}}>{l.split(" ").slice(1).join(" ")}</div>
                      <div style={{fontSize:11,color:"#6b7280"}}>{desc}</div>

                    <div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div>

                  <ResponsiveContainer width="100%" height={180}>
                    <PieChart>
                      <Pie data={[{name:"Perfect",value:analysis.aq.perfect||1},{name:"Wasted",value:analysis.aq.wasted||1},{name:"Overtime",value:analysis.aq.overtime||1},{name:"Confused",value:analysis.aq.confused||1}]} cx="50%" cy="50%" innerRadius={50} outerRadius={75} dataKey="value">

                      </Pie>
                      <Tooltip contentStyle={{fontSize:11}}/>
                      <Legend wrapperStyle={{fontSize:11}}/>
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>

            {/* Score Potential */}
            {analysisTab==="potential"&&(
              <div>
                <div className="card" style={{padding:16,marginBottom:12}}>

                  <ResponsiveContainer width="100%" height={170}>
                    <BarChart data={[{n:"Actual",s:analysis.sp.actual},{n:"50% fix",s:analysis.sp.p50},{n:"75% fix",s:analysis.sp.p75},{n:"100% fix",s:analysis.sp.p100}]}>
                      <XAxis dataKey="n" tick={{fontSize:10}}/><YAxis tick={{fontSize:11}}/>
                      <Tooltip contentStyle={{fontSize:11,borderRadius:8}}/>
                      <Bar dataKey="s" radius={[6,6,0,0]} name="Score">
                        {[0,1,2,3].map(i=><Cell key={i} fill={["#ef4444","#f59e0b","#3b82f6","#22c55e"][i]}/>)}
                      </Bar>

                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  <StatCard label="Actual Score" value={analysis.sp.actual} color="#ef4444"/>

                  <StatCard label="Lost to Negatives" value={analysis.negLost} color="#f59e0b"/>
                  <StatCard label="Max Achievable" value={analysis.sp.p100} color="#2563eb"/>

            </div>
            {posts.map(p=>(
              <div key={p.id} className="card" style={{padding:14,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#2563eb,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>{p.name[0].toUpperCase()}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{p.time}</div>
                  </div>
                </div>
                <div style={{fontSize:14,color:"#374151",lineHeight:1.5}}>{p.text}</div>
                <div style={{marginTop:8,display:"flex",gap:12,fontSize:12,color:"#6b7280"}}>
                  <button onClick={()=>setPosts(prev=>prev.map(pp=>pp.id===p.id?{...pp,likes:pp.likes+1}:pp))} style={{background:"none",border:"none",cursor:"pointer",color:"#6b7280",fontSize:12,padding:0}}>❤️ {p.likes}</button>
                </div>
              </div>
            ))}
            <a href="https://t.me/biroskills" target="_blank" rel="noreferrer" style={{display:"block",background:"#0088cc",color:"#fff",borderRadius:10,padding:"12px",textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:14,marginTop:8}}>📱 Join Telegram Community</a>
          </div>
        )}

        {/* ═══ HISTORY ═══ */}
        {page==="history"&&(
          <div className="fade-in">
            <div style={{marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:800,color:"#111827",fontFamily:"'Space Grotesk',sans-serif"}}>Test History</div>
              <div style={{fontSize:13,color:"#6b7280"}}>{tests.length} completed attempts</div>
            </div>
            {tests.length===0?(
              <div className="card" style={{padding:32,textAlign:"center"}}>
                <div style={{fontSize:40,marginBottom:12}}>📊</div>
                <div style={{fontSize:15,fontWeight:700,color:"#374151"}}>Koi history nahi</div>
              </div>
            ):tests.map(t=>(
              <div key={t.id} className="card" style={{padding:14,marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"transform .15s"}} onClick={()=>goAnalysis(t)}
                onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
                <div style={{width:44,height:44,borderRadius:12,background:t.score>0?"#dcfce7":"#fee2e2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                  {t.score>0?"📈":"📉"}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700}}>{t.testName}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{t.ts}</div>
                  <div style={{height:4,borderRadius:2,background:"#f1f5f9",marginTop:5,overflow:"hidden"}}>
                    <div style={{width:`${Math.max(0,(t.score/t.max)*100)}%`,background:t.score>0?"#22c55e":"#ef4444",height:"100%"}}/>
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:16,fontWeight:800,color:t.score>0?"#22c55e":"#ef4444"}}>{t.score}/{t.max}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{t.acc}% acc</div>
                </div>
              </div>
            ))}
            {tests.length>0&&(
              <button onClick={()=>{if(confirm("Sab tests delete karna chahte ho?"))setTests([]);}} style={{width:"100%",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:10,padding:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13,marginTop:8}}>Clear All History</button>
            )}
          </div>
        )}

        {/* ═══ SETTINGS ═══ */}
        {page==="settings"&&(
          <div className="fade-in">
            <div style={{marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:800,color:"#111827",fontFamily:"'Space Grotesk',sans-serif"}}>Settings</div>
              <div style={{fontSize:13,color:"#6b7280"}}>App configure karo</div>
            </div>

            <div className="card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>🔑 Anthropic API Key</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Biro-Brain AI aur Study Planner ke liye zaroori hai. Key console.anthropic.com se lo.</div>
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-..." style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:14,marginBottom:10}}/>
              <button className="btn-primary" onClick={()=>{store.set("biro-key",apiKey);showToast("API key saved! ✅");}} style={{width:"100%"}}>Save API Key</button>
              <div style={{fontSize:11,color:"#6b7280",marginTop:8}}>⚠️ Key browser localStorage mein save hoti hai. Production mein server-side use karo.</div>
            </div>

            <div className="card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>📤 Export / Import Data</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{const d={tests,mistakes,goal};const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="biro-backup.json";a.click();showToast("Data exported! 📥");}} style={{flex:1,background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>
                  <Icon name="download" size={14} color="#2563eb"/> Export
                </button>
                <label style={{flex:1,background:"#f0fdf4",color:"#15803d",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  📂 Import
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tests)setTests(d.tests);if(d.mistakes)setMistakes(d.mistakes);if(d.goal)setGoal(d.goal);showToast("Data imported! ✅");}catch{showToast("Invalid file!","error");}};r.readAsText(f);}}/>
                </label>
              </div>
            </div>

            <div className="card" style={{padding:16,background:"#fff5f5"}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4,color:"#dc2626"}}>⚠️ Danger Zone</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Ye actions undo nahi ho sakti</div>
              <button onClick={()=>{if(confirm("Sab data delete karna chahte ho?")){{setTests([]);setMistakes([]);setPlan(null);localStorage.clear();showToast("All data cleared","error")}}}} style={{width:"100%",background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:10,padding:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>🗑️ Clear All Data</button>
            </div>

            <div className="card" style={{padding:16,marginTop:14,textAlign:"center"}}>
              <div style={{fontSize:22,marginBottom:8}}>🚀</div>
              <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>Biro Test v1.0</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Made with ❤️ for JEE/NEET aspirants</div>
              <a href="https://t.me/biroskills" target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:10,color:"#2563eb",fontSize:12,fontWeight:600}}>Join Telegram Community →</a>
            </div>
          </div>
        )}

      </div>{/* end content */}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:50,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[["dashboard","Home","dashboard"],["tests","Tests","tests"],["analysis","Analysis","chart"],["birobrain","AI","brain"],["community","Social","community"]].map(([p,l,icon])=>(
          <button key={p} onClick={()=>{if(p==="analysis"&&!analysis){setPage("external");return;}setPage(p);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"8px 4px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:page===p?"#2563eb":"#9ca3af",fontFamily:"inherit",transition:"color .15s"}}>
            <Icon name={icon} size={20} color={page===p?"#2563eb":"#9ca3af"}/>
            <span style={{fontSize:9,fontWeight:page===p?700:500}}>{l}</span>
          </button>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
