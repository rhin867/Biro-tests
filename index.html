<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#f1f5f9;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
:root{--blue:#2563eb;--blue-light:#eff6ff;--green:#22c55e;--green-light:#dcfce7;--red:#ef4444;--red-light:#fee2e2;--gray:#94a3b8;--gray-light:#f1f5f9;--yellow:#f59e0b;--purple:#7c3aed;--text:#111827;--sub:#6b7280;--border:#e2e8f0}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#f1f5f9}
.header{background:#fff;border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo-box{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page{padding:14px 14px 88px;animation:fadeIn .25s ease}
.card{background:#fff;border-radius:14px;border:1px solid var(--border)}
.cp{padding:14px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;background:none;border:none;cursor:pointer;padding:7px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#9ca3af;font-family:inherit;font-size:9px;font-weight:500;transition:color .15s}
.bnav-btn.active{color:var(--blue);font-weight:700}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:268px;background:#fff;z-index:201;padding:14px 10px;overflow-y:auto;transform:translateX(-100%);transition:transform .22s ease}
.drawer.open{transform:translateX(0)}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:10px;cursor:pointer;color:#475569;font-weight:500;font-size:14px;transition:all .12s;margin-bottom:2px}
.nav-item:hover,.nav-item.active{background:var(--blue-light);color:var(--blue)}
.nav-item.active{font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;padding:10px 18px;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1d4ed8}.btn-p:disabled{opacity:.6;cursor:not-allowed}
.btn-d{background:var(--red);color:#fff}
.btn-o{background:#fff;color:var(--blue);border:2px solid var(--blue)}
.btn-g{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
.btn-w{width:100%;justify-content:center}
input,textarea,select{font-family:inherit;font-size:14px;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;width:100%;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical}
label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.sg{display:flex;gap:10px;margin-bottom:12px}
.sc{background:#fff;border-radius:12px;padding:13px 14px;border:1px solid var(--border);flex:1;min-width:0}
.sl{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:22px;font-weight:800;line-height:1.2;margin-top:2px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 13px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;white-space:nowrap;transition:all .12s;flex-shrink:0}
.tab.active{background:var(--blue);color:#fff}
.tab:not(.active){background:#e2e8f0;color:#475569}
.chip{display:inline-block;font-size:10px;background:var(--gray-light);color:#475569;padding:2px 8px;border-radius:20px;font-weight:600}
.qb{display:inline-flex;align-items:center;justify-content:center;width:27px;height:27px;border-radius:7px;font-size:10px;font-weight:700}
.qb.correct{background:var(--green-light);color:#16a34a}.qb.incorrect{background:var(--red-light);color:#dc2626}.qb.skipped{background:var(--gray-light);color:var(--gray)}
.chat-wrap{display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;padding-bottom:10px;min-height:0}
.bubble{padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.65;max-width:92%;animation:fadeIn .25s ease;word-break:break-word}
.bubble.user{background:var(--blue);color:#fff;border-bottom-right-radius:3px;align-self:flex-end}
.bubble.ai{background:#fff;color:var(--text);border-bottom-left-radius:3px;border:1px solid var(--border);align-self:flex-start}
.tdot{width:8px;height:8px;border-radius:50%;background:#94a3b8;animation:blink 1.2s ease-in-out infinite;display:inline-block}
.prog-bar{height:9px;border-radius:5px;background:#f1f5f9;overflow:hidden;display:flex}
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:999;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.15);white-space:nowrap;animation:fadeIn .2s ease;pointer-events:none}
.toast.s{background:#22c55e;color:#fff}.toast.e{background:#ef4444;color:#fff}.toast.i{background:#2563eb;color:#fff}
.rec{width:9px;height:9px;border-radius:50%;background:#ef4444;animation:blink .8s ease-in-out infinite;flex-shrink:0;display:inline-block}
.li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f8fafc}
.li:last-child{border-bottom:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sec-t{font-size:20px;font-weight:800;color:var(--text);font-family:'Space Grotesk',sans-serif}
.sec-s{font-size:13px;color:var(--sub);margin-top:2px;margin-bottom:16px}
.spin-loader{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app">
  <div class="header">

      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="18" height="18"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2z"/></svg>

      <div style="display:flex;align-items:center;gap:9px">
        <div class="logo-box" style="width:38px;height:38px;border-radius:12px"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="20" height="20"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2z"/></svg></div>
        <div><div style="font-size:16px;font-weight:800;font-family:'Space Grotesk',sans-serif">Biro Test</div><div style="font-size:11px;color:var(--sub)">CBT Analyzer</div></div>
      </div>
      <button onclick="toggleDrawer()" style="background:none;border:none;cursor:pointer;color:#6b7280;display:flex">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="nav-links"></div>
    <div style="margin-top:14px;padding:10px 12px;background:#f8fafc;border-radius:10px;font-size:12px;color:var(--sub)">Biro Test v1.0 · Made for JEE/NEET 🎯</div>
  </div>
  <div id="pg"></div>
  <div class="bottom-nav" id="bnav"></div>
  <div class="toast" id="toast" style="display:none"></div>
</div>

<script>
// ── STATE ──
var S={
  page:'dashboard',
  tests:lsGet('biro-tests',[]),
  cur:lsGet('biro-cur',null),
  mb:lsGet('biro-mb',[]),
  goal:lsGet('biro-goal',{college:'IIT Bombay – CS',hours:8,months:6}),
  posts:lsGet('biro-posts',[
    {id:1,name:'Rahul',text:'Wave Optics Q34 ka concept samjhao koi? 😭',time:'2h ago',likes:8},
    {id:2,name:'Priya',text:'QFT-01 attempt kiya? Maths bahut tough tha!',time:'5h ago',likes:14},
  ]),
  chat:[{r:'ai',c:'⚡ <b>Biro-Brain online!</b> Tera JEE/NEET AI mentor hoon.<br><br>• 📊 Test results analyze karna<br>• 🗓️ Study plan banana<br>• 💡 Doubts solve karna<br>• 🎯 Strategy<br><br>Koi bhi doubt pucho!'}],
  atab:'overview',
  key:localStorage.getItem('biro-key')||'',
  mon:false,monT:0,monInt:null,
  plan:localStorage.getItem('biro-plan')||'',
  chatLoading:false,
};

function lsGet(k,def){try{var v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── DATA ──
var SUBJ=['Mathematics','Physics','Chemistry'];
var CH={
  Mathematics:['Matrices & Determinants','Permutations & Combinations','Polynomials','3D Geometry','Probability','Integral Calculus','Area Under Curves','Inverse Trig','Conic Sections','Vector Algebra','Limits','Functions','Sequences & Series','Differential Equations','Complex Numbers','Trigonometry'],
  Physics:['Semiconductor Electronics','Properties of Matter','Rotational Motion','Ray Optics','Wave Optics','Electromagnetic Induction','Projectile Motion','Work Energy Power','Oscillations','Units & Dimensions','Thermodynamics','Electrostatics','Current Electricity','Magnetism'],
  Chemistry:['Qualitative Analysis','Basic Concepts','Thermodynamics','Organic Chemistry','Electrochemistry','Chemical Bonding','Equilibrium','Coordination Compounds','s-Block','p-Block','Biomolecules','Polymers'],
};
var COLLEGES=[
  {n:'IIT Bombay – CS',c:280},{n:'IIT Delhi – CS',c:270},{n:'IIT Madras – CS',c:265},
  {n:'IIT Kanpur – CS',c:255},{n:'NIT Trichy – CSE',c:200},{n:'NIT Warangal – CSE',c:190},
  {n:'AIIMS Delhi',c:680},{n:'JIPMER',c:650},
];
var NAV=[
  {id:'dashboard',lbl:'Dashboard',e:'🏠'},
  {id:'tests',lbl:'My Tests',e:'📄'},
  {id:'external',lbl:'External Analysis',e:'🔍'},
  {id:'planner',lbl:'Study Planner',e:'📅'},
  {id:'birobrain',lbl:'Biro-Brain AI',e:'🧠'},
  {id:'mistakes',lbl:'Mistake Book',e:'📖'},
  {id:'goal',lbl:'Goal Tracker',e:'🎯'},
  {id:'community',lbl:'Community',e:'👥'},
  {id:'history',lbl:'History',e:'📊'},
  {id:'settings',lbl:'Settings',e:'⚙️'},
];

// ── UTILS ──
var _toastT;
function toast(msg,type){
  var el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg; el.className='toast '+(type==='e'?'e':type==='i'?'i':'s');
  el.style.display='block';
  clearTimeout(_toastT);
  _toastT=setTimeout(function(){el.style.display='none';},2800);
}

function fmt(s){return ('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);}

function parseAns(str){
  var res={};
  if(!str||!str.trim())return res;
  var s=str.trim();
  if(s.indexOf('-')>-1||s.indexOf(',')>-1){
    s.split(/[,\n]/).forEach(function(p){
      var parts=p.trim().split(/[-.\s]+/);
      if(parts.length>=2){var n=parseInt(parts[0]);var a=parts[parts.length-1].toUpperCase();if(!isNaN(n)&&n>0&&/^[A-D]/.test(a))res[n-1]=a;}
    });
  } else {
    s.replace(/\s/g,'').split('').forEach(function(c,i){if(/[A-Da-d]/.test(c))res[i]=c.toUpperCase();});
  }
  return res;
}

function esc(s){return s?String(s).replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];}):''}

function mdToHtml(t){
  if(!t)return '';
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/\n/g,'<br>');
}

function pct(v,mx){return mx?Math.max(0,Math.round((v/mx)*100)):0;}

// ── ANALYSIS ──
function genAnalysis(ua,ka,cS,wS,name){
  var correct=0,incorrect=0,skipped=0;
  var ss={Mathematics:{correct:0,incorrect:0,skipped:0,qs:25},Physics:{correct:0,incorrect:0,skipped:0,qs:25},Chemistry:{correct:0,incorrect:0,skipped:0,qs:25}};
  var missed={Mathematics:[],Physics:[],Chemistry:[]};
  var qR=[];
  for(var i=0;i<75;i++){
    var s=i<25?'Mathematics':i<50?'Physics':'Chemistry';
    var ch=CH[s][i%CH[s].length];
    var u=ua[i]||null;
    var ca=ka[i]||['A','B','C','D'][Math.floor(Math.random()*4)];
    var r=u?(u===ca?'correct':'incorrect'):'skipped';
    if(r==='correct'){correct++;ss[s].correct++;}
    else if(r==='incorrect'){incorrect++;ss[s].incorrect++;if(missed[s].indexOf(ch)<0)missed[s].push(ch);}
    else{skipped++;ss[s].skipped++;}
    qR.push({q:i+1,s:s,ch:ch,r:r,u:u,ca:ca});
  }
  var score=correct*cS-incorrect*wS;
  var max=75*cS;
  var acc=correct+incorrect>0?Math.round(correct/(correct+incorrect)*100):0;
  var personas=['The Gambler 🎲','The Safe Player 🛡️','The Speedster ⚡','The Overthinker 🤔','The Wild Card 🃏','The Sniper 🎯'];
  return {
    id:Date.now(),name:esc(name),score:score,max:max,acc:acc,correct:correct,incorrect:incorrect,skipped:skipped,cS:cS,wS:wS,
    ss:ss,missed:missed,qR:qR,
    aq:{perfect:correct,wasted:Math.round(incorrect*.6),overtime:Math.round(correct*.2),confused:Math.round(incorrect*.15)},
    sp:{actual:score,p50:score+Math.round(incorrect*.5*cS),p75:score+Math.round(incorrect*.75*cS),p100:score+incorrect*cS},
    persona:personas[Math.floor(Math.random()*personas.length)],
    negLost:incorrect*wS,
    ts:new Date().toLocaleDateString('en-IN'),
  };
}

// ── AI API ──
async function callAI(msgs){
  var key=S.key||localStorage.getItem('biro-key')||'';
  if(!key) throw new Error('API key set karo Settings mein');
  var ctx=S.cur;
  var sys='You are "Biro-Brain", elite AI Mentor for JEE/NEET aspirants. Be energetic, data-driven, direct like an IIT alumnus coach.\n'+(ctx?'Test context: Score '+ctx.score+'/'+ctx.max+', Accuracy '+ctx.acc+'%, Missed: '+JSON.stringify(ctx.missed)+'\n':'')+'Rules: concise bullets, bold key terms, gamify (quests/boss raids/leveling up), LaTeX for math, no generic quotes, hint first for doubts, be brutally honest.';
  var apiMsgs=msgs.filter(function(m){return m.r!=='ai'||msgs.indexOf(m)===0?true:true;}).map(function(m){return {role:m.r==='ai'?'assistant':'user',content:m.c.replace(/<[^>]+>/g,'').substring(0,500)};});
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:sys,messages:apiMsgs}),
  });
  var d=await resp.json();
  if(d.error)throw new Error(d.error.message||'API error');
  return d.content&&d.content[0]&&d.content[0].text||'No response';
}

// ── DRAWER / NAV ──
function toggleDrawer(){
  var ov=document.getElementById('dov'),dr=document.getElementById('drw');
  var open=dr.classList.contains('open');
  if(open){dr.classList.remove('open');ov.classList.remove('open');}
  else{dr.classList.add('open');ov.classList.add('open');}
}

function renderNav(){
  var nl=document.getElementById('nav-links');
  if(nl) nl.innerHTML=NAV.map(function(n){
    return '<div class="nav-item '+(S.page===n.id?'active':'')+'" onclick="go(\''+n.id+'\');toggleDrawer()">'+n.e+' '+n.lbl+'</div>';
  }).join('');

  var bn=document.getElementById('bnav');
  if(bn) bn.innerHTML=[
    {id:'dashboard',lbl:'Home',e:'🏠'},
    {id:'tests',lbl:'Tests',e:'📄'},
    {id:'analysis',lbl:'Analysis',e:'📊'},
    {id:'birobrain',lbl:'AI',e:'🧠'},
    {id:'community',lbl:'Social',e:'👥'},
  ].map(function(n){
    var active=(S.page===n.id)||(n.id==='analysis'&&S.page==='analysis');
    return '<button class="bnav-btn '+(active?'active':'')+'" onclick="bClick(\''+n.id+'\')">'
      +'<span style="font-size:18px">'+n.e+'</span>'+n.lbl+'</button>';
  }).join('');
}

function bClick(id){
  if(id==='analysis'){go(S.cur?'analysis':'external');}
  else{go(id);}
}

// ── ROUTER ──
function go(id){
  S.page=id;
  renderNav();
  var c=document.getElementById('pg');

// ── HELPERS ──
function sc(label,val,color,sub){
  return '<div class="sc"><div class="sl">'+label+'</div><div class="sv" style="color:'+color+'">'+val+'</div>'+(sub?'<div style="font-size:10px;color:#9ca3af">'+sub+'</div>':'')+'</div>';
}

function barChart(vals,labels,colors){
  var max=Math.max.apply(null,vals)||1;
  return '<div style="display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px">'
    +vals.map(function(v,i){
      var h=Math.max(4,Math.round((v/max)*95));
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'
        +'<div style="font-size:11px;font-weight:700;color:'+colors[i]+'">'+v+'</div>'
        +'<div style="width:100%;background:'+colors[i]+';border-radius:5px 5px 0 0;height:'+h+'px"></div>'
        +'<div style="font-size:10px;color:var(--sub)">'+labels[i]+'</div>'
        +'</div>';
    }).join('')+'</div>';
}

function multiBarChart(groups){
  var all=[];
  groups.forEach(function(g){g.bars.forEach(function(b){all.push(b.v);});});
  var max=Math.max.apply(null,all)||1;
  return '<div style="display:flex;align-items:flex-end;gap:6px;height:110px">'
    +groups.map(function(g){
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'
        +'<div style="display:flex;align-items:flex-end;gap:2px;width:100%">'
        +g.bars.map(function(b){var h=Math.max(3,Math.round((b.v/max)*95));return '<div style="flex:1;background:'+b.c+';border-radius:4px 4px 0 0;height:'+h+'px"></div>';}).join('')
        +'</div><div style="font-size:10px;color:var(--sub)">'+g.lbl+'</div>'
        +'</div>';
    }).join('')+'</div>';
}

// ── MONITOR ──
async function startMon(){
  try{var stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false});window._ms=stream;}catch(e){}
  S.mon=true;S.monT=0;
  S.monInt=setInterval(function(){
    S.monT++;
    var el=document.getElementById('rec-time');if(el)el.textContent=fmt(S.monT);
    var el2=document.getElementById('rec-time-ext');if(el2)el2.textContent=fmt(S.monT);
  },1000);
  document.getElementById('rec-badge').style.display='flex';
  toast('Monitor started 🔴');
  go('external');
}

function stopMon(){
  if(window._ms){window._ms.getTracks().forEach(function(t){t.stop();});window._ms=null;}
  clearInterval(S.monInt);S.mon=false;
  document.getElementById('rec-badge').style.display='none';
  toast('Session ended – '+fmt(S.monT));
  S.monT=0;go('external');
}

// ── GENERATE ──
function doGen(){
  var key=document.getElementById('ek').value;
  var ans=document.getElementById('ea').value;
  var name=document.getElementById('en').value||'My Test';
  var cS=parseInt(document.getElementById('sc').value)||4;
  var wS=parseInt(document.getElementById('sw').value)||1;
  if(!key.trim()){toast('Answer key daalo!','e');return;}
  var ua=parseAns(ans),ka=parseAns(key);
  var a=genAnalysis(ua,ka,cS,wS,name);
  var newMb=S.mb.concat(a.qR.filter(function(q){return q.r==='incorrect';}).map(function(q){return {q:q.q,s:q.s,ch:q.ch,r:q.r,u:q.u,ca:q.ca,date:a.ts,tn:a.name,id:a.id+'-'+q.q};})).slice(-300);
  S.mb=newMb;lsSave('biro-mb',newMb);
  S.tests=[a].concat(S.tests);lsSave('biro-tests',S.tests);
  S.cur=a;lsSave('biro-cur',a);
  S.atab='overview';
  toast('Analysis ready! 🎉');
  go('analysis');
}

// ── CHAT ──
function renderChatMsgs(){
  var w=document.getElementById('chat-msgs');
  if(!w)return;
  var html=S.chat.map(function(m){
    return '<div style="display:flex;justify-content:'+(m.r==='user'?'flex-end':'flex-start')+'">'
      +'<div class="bubble '+(m.r==='user'?'user':'ai')+'">'+(m.r==='user'?esc(m.c):m.c)+'</div></div>';
  }).join('');
  if(S.chatLoading){
    html+='<div style="display:flex"><div class="bubble ai" style="display:flex;align-items:center;gap:5px">'
      +'<span class="tdot" style="animation-delay:0s"></span><span class="tdot" style="animation-delay:.2s"></span><span class="tdot" style="animation-delay:.4s"></span>'
      +'</div></div>';
  }
  html+='<div id="chat-end"></div>';
  w.innerHTML=html;
  setTimeout(function(){var e=document.getElementById('chat-end');if(e)e.scrollIntoView({behavior:'smooth'});},50);
}

async function sendChat(){
  var inp=document.getElementById('ci');
  if(!inp||!inp.value.trim()||S.chatLoading)return;
  var msg=inp.value.trim();inp.value='';
  S.chat.push({r:'user',c:msg});
  S.chatLoading=true;renderChatMsgs();
  try{
    var res=await callAI(S.chat);
    S.chat.push({r:'ai',c:mdToHtml(res)});
  }catch(e){
    S.chat.push({r:'ai',c:'❌ <b>Error:</b> '+esc(e.message)});
  }
  S.chatLoading=false;renderChatMsgs();
}

function setChipMsg(msg){var el=document.getElementById('ci');if(el){el.value=msg;el.focus();}}

async function genPlan(){
  var btn=document.getElementById('gpbtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin-loader"></span> Generating...';}
  var ctx=S.cur?'Missed: '+JSON.stringify(S.cur.missed)+', Score: '+S.cur.score+'/'+S.cur.max:'Target: '+S.goal.college;
  try{
    var res=await callAI([{r:'user',c:'Generate a detailed 7-day JEE/NEET study plan. Context: '+ctx+'. Target: '+S.goal.college+'. Hours/day: '+S.goal.hours+'. Use RPG format: day titles, Daily Quests, Boss Raid (hardest missed topic), XP Reward. Be specific and actionable.'}]);
    S.plan=res;localStorage.setItem('biro-plan',res);
    toast('Study plan ready! 📅');go('planner');
  }catch(e){
    toast(esc(e.message),'e');
    if(btn){btn.disabled=false;btn.innerHTML='✨ Generate New Plan';}
  }
}

  }
  else if(tab==='painful'){
    var wrong=a.qR.filter(function(q){return q.r==='incorrect';});
    tabHtml='<div class="card cp"><div style="font-size:14px;font-weight:700;margin-bottom:4px">🔥 Painful Questions</div><div style="font-size:12px;color:var(--sub);margin-bottom:14px">In questions ne score harm kiya</div>'
      +wrong.map(function(q){
        return '<div class="li"><div style="width:32px;height:32px;border-radius:8px;background:#fee2e2;color:#dc2626;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">Q'+q.q+'</div>'
          +'<div style="flex:1"><div style="font-size:12px;font-weight:600">'+q.s+' · '+esc(q.ch)+'</div><div style="font-size:11px;color:var(--sub)">Tumne: '+(q.u||'—')+' | Sahi: '+q.ca+'</div></div>'
          +'<div style="font-size:12px;font-weight:700;color:#ef4444;flex-shrink:0">-'+a.wS+'</div></div>';
      }).join('')
    +'</div>';
  }

  return '<div style="margin-bottom:12px"><div style="font-size:18px;font-weight:800;font-family:\'Space Grotesk\',sans-serif">'+a.name+'</div><div style="font-size:12px;color:var(--sub)">Attempt #1 · '+a.ts+'</div></div>'
    +'<div class="sg">'+sc('Score',a.score,a.score>0?'#2563eb':'#ef4444','/'+a.max)+sc('Accuracy',a.acc+'%',a.acc>50?'#22c55e':'#ef4444')+'</div>'
    +'<div class="sg">'+sc('Correct ✓',a.correct,'#22c55e','+'+a.correct*a.cS)+sc('Wrong ✗',a.incorrect,'#ef4444','-'+a.incorrect*a.wS)+sc('Skipped',a.skipped,'#94a3b8')+'</div>'
    +'<div class="card cp" style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:7px">Overall Performance</div>'
      +'<div class="prog-bar"><div style="width:'+pct(a.correct,75)+'%;background:#22c55e;height:100%"></div><div style="width:'+pct(a.incorrect,75)+'%;background:#ef4444;height:100%"></div></div>'
      +'<div style="display:flex;gap:12px;margin-top:6px;font-size:11px">'+[['#22c55e','Correct',a.correct],['#ef4444','Wrong',a.incorrect],['#94a3b8','Skip',a.skipped]].map(function(x){return '<div style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:8px;border-radius:2px;background:'+x[0]+'"></div><span style="color:var(--sub)">'+x[1]+' ('+x[2]+')</span></div>';}).join('')+'</div>'
    +'</div>'
    +'<div class="tabs">'+[['overview','Overview'],['attempt','Attempt'],['potential','Potential'],['time','Journey'],['missed','Missed'],['painful','Painful Qs']].map(function(x){return '<button class="tab '+(tab===x[0]?'active':'')+'" onclick="switchTab(\''+x[0]+'\')">'+x[1]+'</button>';}).join('')+'</div>'
    +tabHtml
    +'<div style="display:flex;gap:10px;margin-top:14px">'
      +'<button class="btn btn-g btn-w" onclick="setChipMsg(\'Mera latest test analyze karo aur specific improvement advice do\');go(\'birobrain\')">🧠 AI Practice</button>'
      +'<button class="btn btn-o btn-w" onclick="go(\'planner\')">📅 Study Plan</button>'
    +'</div>';
}

function switchTab(t){S.atab=t;go('analysis');}

function pgChat(){
  return '<div style="margin-bottom:10px"><div class="sec-t">Biro-Brain AI</div><div style="font-size:13px;color:var(--sub)">Tera elite JEE/NEET mentor 🧠</div></div>'
    +(!S.key?'<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:9px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:#92400e;display:flex;align-items:center;justify-content:space-between;gap:8px">⚠️ API key set karo <button class="btn btn-p" style="padding:4px 10px;font-size:11px" onclick="go(\'settings\')">Settings</button></div>':'')
    +(S.cur?'<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#1e40af">📊 <b>'+S.cur.name+'</b> · Score: '+S.cur.score+'/'+S.cur.max+' · Acc: '+S.cur.acc+'%</div>':'')
    +'<div style="height:calc(100vh - 300px);min-height:280px;display:flex;flex-direction:column">'
      +'<div id="chat-msgs" class="chat-wrap"></div>'
    +'</div>'
    +'<div style="border-top:1px solid var(--border);padding-top:10px;background:#f1f5f9;margin:0 -14px -14px;padding:10px 14px">'
      +'<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;scrollbar-width:none">'
        +['Analyze my test','Study plan banao','Missed concept explain karo','Time strategy','Mock test tips'].map(function(p){return '<button onclick="setChipMsg(\''+p+'\')" style="white-space:nowrap;background:#fff;border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:600;color:#475569;cursor:pointer;flex-shrink:0">'+p+'</button>';}).join('')
      +'</div>'
      +'<div style="display:flex;gap:8px">'
        +'<input id="ci" placeholder="Doubt pucho ya plan maango..." style="flex:1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChat();}"/>'
        +'<button onclick="sendChat()" style="width:42px;height:42px;background:var(--blue);color:#fff;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">➤</button>'
      +'</div>'
    +'</div>';
}

function pgPlanner(){
  return '<div class="sec-t">Study Planner</div><div class="sec-s">AI-powered weekly plan</div>'
    +'<button id="gpbtn" class="btn btn-g btn-w" style="font-size:15px;padding:14px;margin-bottom:18px" onclick="genPlan()">✨ Generate New Plan</button>'
    +(S.plan?'<div class="card cp"><div style="font-size:14px;font-weight:700;margin-bottom:12px">📅 Your 7-Day Quest Plan</div><div style="font-size:13px;color:#374151;line-height:1.8">'+mdToHtml(S.plan)+'</div></div>'
    :'<div class="card cp" style="text-align:center;padding:28px"><div style="font-size:40px;margin-bottom:10px">📅</div><div style="font-size:15px;font-weight:700">No Study Plan Yet</div><div style="font-size:13px;color:var(--sub);margin-top:6px">AI test ke basis pe plan banata hai</div></div>');
}

function pgMistakes(){
  var m=S.mb;
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<div><div class="sec-t">Mistake Book</div><div style="font-size:13px;color:var(--sub)">'+m.length+' questions</div></div>'
    +(m.length?'<button class="btn" style="background:#fee2e2;color:#dc2626;padding:6px 12px;font-size:12px" onclick="clearMb()">Clear</button>':'')
  +'</div>'
  +(m.length?SUBJ.map(function(s){
    var sm=m.filter(function(q){return q.s===s;});
    if(!sm.length)return '';
    return '<div class="card cp" style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;margin-bottom:10px;color:'+(s==='Mathematics'?'#7c3aed':s==='Physics'?'#0ea5e9':'#059669')+'">'+s+' ('+sm.length+')</div>'
      +sm.slice(0,15).map(function(q){return '<div class="li"><div class="qb incorrect">Q'+q.q+'</div><div style="flex:1"><div style="font-size:12px;font-weight:600">'+esc(q.ch)+'</div><div style="font-size:11px;color:var(--sub)">'+esc(q.tn)+' · '+q.date+'</div></div><div style="font-size:11px;color:#ef4444;font-weight:700;flex-shrink:0">✗'+(q.u||'–')+' ✓'+q.ca+'</div></div>';}).join('')
      +(sm.length>15?'<div style="text-align:center;padding:8px;font-size:12px;color:var(--sub)">+'+( sm.length-15)+' more</div>':'')
    +'</div>';
  }).join(''):'<div class="card cp" style="text-align:center;padding:28px"><div style="font-size:40px;margin-bottom:10px">📖</div><div style="font-size:15px;font-weight:700">Koi mistake nahi abhi</div><div style="font-size:13px;color:var(--sub);margin-top:6px">Galat answers automatically yahan save hote hain</div></div>');
}

function clearMb(){if(confirm('Clear all?')){S.mb=[];lsSave('biro-mb',[]);go('mistakes');}}

function pgGoal(){
  var tc=COLLEGES.filter(function(c){return c.n===S.goal.college;})[0]||COLLEGES[0];
  var avgScore=S.tests.length?Math.round(S.tests.reduce(function(a,t){return a+(t.score||0);},0)/S.tests.length):0;
  var gap=Math.max(0,tc.c-avgScore);
  var daily=S.goal.months>0?Math.ceil(gap/(S.goal.months*30)):0;
  return '<div class="sec-t">Goal Tracker</div><div class="sec-s">Target set karo, progress track karo</div>'
    +'<div class="card cp" style="margin-bottom:12px">'
      +'<div style="margin-bottom:12px"><label>Target College</label><select onchange="S.goal.college=this.value;lsSave(\'biro-goal\',S.goal);go(\'goal\')">'+COLLEGES.map(function(c){return '<option value="'+c.n+'" '+(S.goal.college===c.n?'selected':'')+'>'+c.n+' ('+c.c+')</option>';}).join('')+'</select></div>'
      +'<div class="g2" style="margin-bottom:12px"><div><label>Study Hours/Day</label><input type="number" value="'+S.goal.hours+'" onchange="S.goal.hours=+this.value;lsSave(\'biro-goal\',S.goal)"/></div><div><label>Months Left</label><input type="number" value="'+S.goal.months+'" onchange="S.goal.months=+this.value;lsSave(\'biro-goal\',S.goal)"/></div></div>'
      +'<button class="btn btn-p btn-w" onclick="toast(\'Goal saved! 🎯\')">Save Goal</button>'
    +'</div>'
    +'<div class="card cp" style="background:linear-gradient(135deg,#eff6ff,#f0fdf4);margin-bottom:12px">'
      +'<div style="font-size:16px;font-weight:800;text-align:center;margin-bottom:14px">'+S.goal.college+'</div>'
      +'<div style="display:flex;justify-content:space-around;text-align:center">'
        +'<div><div style="font-size:11px;color:var(--sub)">Your Avg</div><div style="font-size:30px;font-weight:900;color:'+(avgScore>0?'#22c55e':'#ef4444')+'">'+avgScore+'</div></div>'
        +'<div><div style="font-size:11px;color:var(--sub)">Target</div><div style="font-size:30px;font-weight:900;color:var(--blue)">'+tc.c+'</div></div>'
        +'<div><div style="font-size:11px;color:var(--sub)">Gap</div><div style="font-size:30px;font-weight:900;color:#f59e0b">'+gap+'</div></div>'
      +'</div>'
    +'</div>'
    +'<div class="card cp" style="background:#fff7ed;border:1px solid #fde68a;margin-bottom:12px">'
      +'<div style="font-size:13px;font-weight:700;color:#92400e">⚡ Effort Required</div>'
      +'<div style="font-size:14px;color:#78350f;margin-top:6px">Daily: <b style="color:var(--blue)">'+daily+' marks/day</b> with <b>'+S.goal.hours+'h/day</b> over <b>'+S.goal.months+' months</b></div>'
    +'</div>'
    +(S.tests.length>1?'<div class="card cp"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Score Trend</div>'
      +barChart(S.tests.slice(0,8).reverse().map(function(t){return t.score<0?0:t.score;}),S.tests.slice(0,8).reverse().map(function(_,i){return 'T'+(i+1);}),S.tests.slice(0,8).reverse().map(function(t){return t.score>0?'#2563eb':'#ef4444';}))
    +'</div>':'');
}

function pgCommunity(){
  return '<div class="sec-t">Community</div><div class="sec-s">Fellow aspirants se connect karo 🤝</div>'
    +'<div class="card cp" style="margin-bottom:12px"><textarea id="pinp" rows="3" placeholder="Strategy, doubt, motivation share karo..."></textarea><button class="btn btn-p" style="margin-top:10px" onclick="addPost()">Post</button></div>'
    +'<div id="plist">'+renderPosts()+'</div>'
    +'<a href="https://t.me/biroskills" target="_blank" style="display:block;background:#0088cc;color:#fff;border-radius:10px;padding:12px;text-align:center;text-decoration:none;font-weight:700;font-size:14px;margin-top:6px">📱 Join Telegram Community</a>';
}

function renderPosts(){
  return S.posts.map(function(p){
    return '<div class="card cp" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +'<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0">'+p.name[0].toUpperCase()+'</div>'
        +'<div><div style="font-size:13px;font-weight:700">'+esc(p.name)+'</div><div style="font-size:11px;color:#9ca3af">'+p.time+'</div></div>'
      +'</div>'
      +'<div style="font-size:14px;color:#374151;line-height:1.5">'+esc(p.text)+'</div>'
      +'<div style="margin-top:8px"><button onclick="likePost('+p.id+')" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--sub)">❤️ '+p.likes+'</button></div>'
    +'</div>';
  }).join('');
}

function addPost(){
  var inp=document.getElementById('pinp');
  if(!inp||!inp.value.trim()){toast('Kuch type karo!','e');return;}
  S.posts=[{id:Date.now(),name:'You',text:inp.value.trim(),time:'abhi',likes:0}].concat(S.posts);
  lsSave('biro-posts',S.posts);
  go('community');
}

function likePost(id){
  S.posts=S.posts.map(function(p){return p.id===id?Object.assign({},p,{likes:p.likes+1}):p;});
  lsSave('biro-posts',S.posts);
  var pl=document.getElementById('plist');
  if(pl)pl.innerHTML=renderPosts();
}

function pgHistory(){
  var t=S.tests;
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<div><div class="sec-t">Test History</div><div style="font-size:13px;color:var(--sub)">'+t.length+' attempts</div></div>'
    +(t.length?'<button class="btn" style="background:#fee2e2;color:#dc2626;padding:6px 12px;font-size:12px" onclick="if(confirm(\'Sab delete?\''+')){S.tests=[];lsSave(\'biro-tests\',[]);go(\'history\')}">Clear All</button>':'')
  +'</div>'
  +(t.length?t.map(function(tt){
    return '<div class="card cp" style="margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px" onclick="openTest('+tt.id+')">'
      +'<div style="width:44px;height:44px;border-radius:12px;background:'+(tt.score>0?'#dcfce7':'#fee2e2')+';display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+(tt.score>0?'📈':'📉')+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">'+tt.name+'</div><div style="font-size:11px;color:var(--sub)">'+tt.ts+'</div>'
        +'<div style="height:4px;border-radius:2px;background:#f1f5f9;margin-top:5px;overflow:hidden"><div style="width:'+pct(tt.score,tt.max)+'%;background:'+(tt.score>0?'#22c55e':'#ef4444')+';height:100%"></div></div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0"><div style="font-size:16px;font-weight:800;color:'+(tt.score>0?'#22c55e':'#ef4444')+'">'+tt.score+'/'+tt.max+'</div><div style="font-size:11px;color:var(--sub)">'+tt.acc+'%</div></div>'
    +'</div>';
  }).join(''):'<div class="card cp" style="text-align:center;padding:28px"><div style="font-size:38px;margin-bottom:10px">📊</div><div style="font-size:15px;font-weight:700">Koi history nahi</div></div>');
}

function pgSettings(){
  return '<div class="sec-t">Settings</div><div class="sec-s">App configure karo</div>'
    +'<div class="card cp" style="margin-bottom:12px">'
      +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">🔑 Anthropic API Key</div>'
      +'<div style="font-size:12px;color:var(--sub);margin-bottom:10px">Biro-Brain AI ke liye. console.anthropic.com se lo.</div>'
      +'<input type="password" id="akinp" value="'+esc(S.key)+'" placeholder="sk-ant-api03-..." style="margin-bottom:10px"/>'
      +'<button class="btn btn-p btn-w" onclick="saveKey()">Save API Key</button>'
      +'<div style="font-size:11px;color:#9ca3af;margin-top:8px">⚠️ Key localStorage mein save hoti hai</div>'
    +'</div>'
    +'<div class="card cp" style="margin-bottom:12px">'
      +'<div style="font-size:14px;font-weight:700;margin-bottom:12px">📤 Export / Import</div>'
      +'<div class="g2"><button class="btn" style="background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe" onclick="exportData()">⬇ Export JSON</button>'
        +'<label class="btn" style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;cursor:pointer;justify-content:center">📂 Import<input type="file" accept=".json" style="display:none" onchange="importData(this)"/></label>'
      +'</div>'
    +'</div>'
    +'<div class="card cp" style="background:#fff5f5;margin-bottom:12px">'
      +'<div style="font-size:14px;font-weight:700;color:#dc2626;margin-bottom:4px">⚠️ Danger Zone</div>'
      +'<div style="font-size:12px;color:var(--sub);margin-bottom:10px">Undo nahi ho sakti</div>'
      +'<button class="btn btn-d btn-w" onclick="clearAll()">🗑️ Clear All Data</button>'
    +'</div>'
    +'<div class="card cp" style="text-align:center"><div style="font-size:28px;margin-bottom:8px">🚀</div><div style="font-size:14px;font-weight:700">Biro Test v1.0</div><div style="font-size:12px;color:var(--sub);margin-top:4px">Made with ❤️ for JEE/NEET aspirants</div><a href="https://t.me/biroskills" target="_blank" style="display:inline-block;margin-top:10px;color:var(--blue);font-size:13px;font-weight:600">Join Telegram →</a></div>';
}

function saveKey(){var v=document.getElementById('akinp').value.trim();S.key=v;localStorage.setItem('biro-key',v);toast('API key saved! ✅');}

function exportData(){
  var d={tests:S.tests,mb:S.mb,goal:S.goal};
  var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(b);var a=document.createElement('a');
  a.href=u;a.download='biro-backup.json';a.click();
  toast('Data exported! 📥');
}

function importData(input){
  var f=input.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.tests){S.tests=d.tests;lsSave('biro-tests',d.tests);}
      if(d.mb){S.mb=d.mb;lsSave('biro-mb',d.mb);}
      if(d.goal){S.goal=d.goal;lsSave('biro-goal',d.goal);}
      toast('Data imported! ✅');go('settings');
    }catch(e){toast('Invalid file!','e');}
  };
  r.readAsText(f);
}

function clearAll(){
  if(confirm('Sab kuch delete karna chahte ho?')){
    S.tests=[];S.mb=[];S.plan='';S.cur=null;
    localStorage.clear();
    toast('All data cleared','e');
    go('dashboard');
  }
}

// ── INIT ──
renderNav();
go('dashboard');
</script>
